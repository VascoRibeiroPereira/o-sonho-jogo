<!DOCTYPE html>
<html lang="pt">
<head>
<title>O Sonho — Chave do Fogo</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#050711">
<link rel="stylesheet" href="style.css">
<script defer src="script.js"></script>
</head>
<body class="state-fogo" data-audio="music">
<div class="background-noise"></div>
<main class="page">

<section class="hero hero--key">
  <div class="orb-wrap" aria-label="Gaia arde">
  <div class="orb orb--fogo">
    <span class="orb-core"></span>
    <span class="orb-ring orb-ring--one"></span>
    <span class="orb-ring orb-ring--two"></span>
    <span class="orb-particles"></span>
  </div>
</div>
  <section class="panel panel--main puzzle-card" data-puzzle data-answer="FOGO" data-next="chave-terra.html">
    <p class="eyebrow">Chave II</p>
    <h1>Fogo</h1>
    <p class="lead">O fogo não é apenas chama. É vontade. É fome. É aquilo que transforma o que toca.</p>
    <p>Este desafio será definido mais tarde.</p>

    <div class="puzzle-step is-visible" data-step="question">
      <h2>Enigma</h2>
      <p>Placeholder: escreve FOGO para avançar.</p>
      <div class="answer-row">
        <input class="answer-input" type="text" placeholder="Escreve a resposta..." autocomplete="off" data-answer-input>
        <button class="btn btn--primary" type="button" data-check-answer>Responder</button>
      </div>
      <p class="feedback" data-feedback></p>
    </div>

    <div class="puzzle-step" data-step="success">
      <h2>A chave desperta</h2>
      <p>A resposta ardeu sem consumir.</p>
      <p class="lead">A Chave do Fogo despertou. Gaia ganha calor.</p>
      <a class="btn btn--primary" href="chave-metal.html">Continuar</a>
    </div>
  </section>
</section>

</main>
</body>
</html>
